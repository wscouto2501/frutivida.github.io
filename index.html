<style>
  :root{
    --bg-deep:#0F1B15;
    --bg-panel:#152720;
    --bg-card:#1C3327;
    --bg-card-2:#20392B;
    --accent-lime:#C6FF3D;
    --accent-lime-soft:#A9E62F;
    --accent-mango:#FF9142;
    --accent-mango-soft:#FFAD6B;
    --text-cream:#F6F3E7;
    --text-muted:#9FB6A7;
    --text-dim:#7C9384;
    --border-soft:rgba(198,255,61,0.14);
    --shadow-color:rgba(0,0,0,0.5);
    --radius-lg:28px;
    --radius-md:18px;
    --radius-sm:12px;
    --font-display:'Fraunces', Georgia, serif;
    --font-body:'Manrope', -apple-system, sans-serif;
    --max-w:1180px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--bg-deep);
    color:var(--text-cream);
    font-family:var(--font-body);
    line-height:1.55;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }
  img{max-width:100%; display:block;}
  a{color:inherit; text-decoration:none;}
  button{font-family:inherit; cursor:pointer; border:none;}
  .wrap{max-width:var(--max-w); margin:0 auto; padding:0 24px;}
  .eyebrow{
    font-family:var(--font-body);
    font-size:12.5px;
    font-weight:800;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--accent-lime);
    display:inline-flex;
    align-items:center;
    gap:8px;
  }
  .eyebrow::before{
    content:'';
    width:18px; height:2px;
    background:var(--accent-lime);
    display:inline-block;
    border-radius:2px;
  }
  h1,h2,h3{ font-family:var(--font-display); font-weight:620; letter-spacing:-0.01em; }
  section{ position:relative; padding:88px 0; }
  .section-tight{ padding:64px 0; }
  .panel-bg{ background:var(--bg-panel); }
  .btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    padding:18px 34px;
    border-radius:100px;
    font-weight:800;
    font-size:15px;
    letter-spacing:0.02em;
    text-transform:uppercase;
    transition:transform .25s ease, box-shadow .25s ease, background .25s ease;
    white-space:nowrap;
  }
  .btn-primary{
    background:linear-gradient(135deg, var(--accent-lime) 0%, var(--accent-lime-soft) 100%);
    color:#122016;
    box-shadow:0 14px 34px -10px rgba(198,255,61,0.55);
  }
  .btn-primary:hover{ transform:translateY(-3px); box-shadow:0 20px 40px -10px rgba(198,255,61,0.7); }
  .btn-ghost{
    background:transparent;
    border:1.5px solid rgba(246,243,231,0.25);
    color:var(--text-cream);
  }
  .btn-ghost:hover{ border-color:var(--accent-mango); color:var(--accent-mango-soft); }
  .btn-block{ width:100%; }
  ::selection{ background:var(--accent-lime); color:#122016; }

  .reveal{ opacity:0; transform:translateY(28px); transition:opacity .8s ease, transform .8s ease; }
  .reveal.in{ opacity:1; transform:translateY(0); }

  header.nav{
    position:fixed; top:0; left:0; right:0; z-index:60;
    background:rgba(15,27,21,0.75);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    border-bottom:1px solid rgba(246,243,231,0.06);
  }
  .nav-inner{ display:flex; align-items:center; justify-content:space-between; padding:16px 24px; max-width:var(--max-w); margin:0 auto; }
  .brand-mark{ font-family:var(--font-display); font-weight:680; font-size:22px; display:flex; align-items:center; gap:8px; }
  .brand-mark span{ color:var(--accent-lime); }
  .nav-cta{ padding:12px 22px; font-size:12.5px; }

  /* HERO */
  .hero{ padding:158px 0 90px; position:relative; overflow:hidden; }
  .hero::before{
    content:''; position:absolute; top:-200px; right:-160px;
    width:640px; height:640px; border-radius:50%;
    background:radial-gradient(circle, rgba(198,255,61,0.16) 0%, transparent 70%);
    filter:blur(10px);
  }
  .hero::after{
    content:''; position:absolute; bottom:-260px; left:-180px;
    width:560px; height:560px; border-radius:50%;
    background:radial-gradient(circle, rgba(255,145,66,0.14) 0%, transparent 70%);
  }
  .hero-grid{ display:grid; grid-template-columns:1.05fr 0.95fr; gap:56px; align-items:center; position:relative; z-index:2; }
  .hero-kicker{ font-family:var(--font-body); font-size:12.5px; font-weight:800; letter-spacing:0.12em; text-transform:uppercase; color:var(--accent-mango-soft); margin-bottom:18px; display:block; }
  .hero h1{ font-size:clamp(32px, 4.2vw, 52px); line-height:1.1; color:var(--text-cream); }
  .hero h1 em{
    font-style:normal;
    background:linear-gradient(100deg, var(--accent-lime) 0%, var(--accent-lime-soft) 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .hero .sub{ margin-top:22px; font-size:17.5px; color:var(--text-muted); max-width:520px; line-height:1.65; }
  .hero-cta-row{ margin-top:32px; display:flex; align-items:center; gap:18px; flex-wrap:wrap; }
  .hero-checklist{ margin-top:26px; display:flex; gap:22px; flex-wrap:wrap; }
  .hero-checklist .item{ display:flex; align-items:center; gap:8px; font-size:13.5px; color:var(--text-muted); font-weight:700; }
  .hero-checklist svg{ flex-shrink:0; color:var(--accent-lime); }

  .hero-visual{ position:relative; height:480px; }
  .deck-card{
    position:absolute; width:230px; border-radius:var(--radius-md); padding:20px;
    background:linear-gradient(155deg, var(--bg-card) 0%, var(--bg-card-2) 100%);
    border:1px solid var(--border-soft);
    box-shadow:0 24px 50px -18px var(--shadow-color);
    animation:floatCard 6s ease-in-out infinite;
  }
  .deck-card .ic{ width:38px; height:38px; margin-bottom:14px; }
  .deck-card .num{ font-family:var(--font-display); font-size:26px; font-weight:680; color:var(--accent-lime); }
  .deck-card .lbl{ font-size:12.5px; color:var(--text-muted); font-weight:600; margin-top:4px; line-height:1.4; }
  .deck-card.c1{ top:6px; left:0; transform:rotate(-7deg); animation-delay:0s; z-index:3;}
  .deck-card.c2{ top:60px; left:150px; transform:rotate(5deg); animation-delay:.8s; z-index:2;}
  .deck-card.c3{ top:190px; left:20px; transform:rotate(3deg); animation-delay:1.6s; z-index:4;}
  .deck-card.c4{ top:250px; left:180px; transform:rotate(-6deg); animation-delay:2.4s; z-index:1;}
  @keyframes floatCard{ 0%,100%{ transform-origin:center; } 50%{ transform:translateY(-12px) rotate(var(--r,0deg)); } }
  .seal{
    position:absolute; top:16px; right:-10px; width:132px; height:132px; border-radius:50%;
    background:linear-gradient(135deg, var(--accent-mango), var(--accent-mango-soft));
    display:flex; align-items:center; justify-content:center; flex-direction:column;
    border:3px dashed rgba(15,27,21,0.35);
    box-shadow:0 20px 40px -12px rgba(255,145,66,0.55);
    animation:spinSlow 22s linear infinite; z-index:6;
  }
  .seal .n{ font-family:var(--font-display); font-size:26px; font-weight:700; color:#12200f; animation:counterSpin 22s linear infinite reverse; }
  .seal .t{ font-size:10px; font-weight:800; letter-spacing:0.04em; text-transform:uppercase; color:#12200f; animation:counterSpin 22s linear infinite reverse; text-align:center; }
  @keyframes spinSlow{ from{ transform:rotate(0deg);} to{ transform:rotate(360deg);} }
  @keyframes counterSpin{ from{ transform:rotate(0deg);} to{ transform:rotate(-360deg);} }

  .section-head{ max-width:640px; margin-bottom:8px; }
  .section-head.center{ max-width:680px; margin-left:auto; margin-right:auto; text-align:center; }
  .section-head h2{ font-size:clamp(27px,3.2vw,38px); margin-top:14px; line-height:1.16; }
  .section-head p.lead{ margin-top:16px; color:var(--text-muted); font-size:16px; }

  /* PROBLEMA */
  .problem-list{ margin-top:44px; display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .problem-row{
    display:flex; align-items:flex-start; gap:14px;
    background:var(--bg-card); border:1px solid var(--border-soft); border-radius:var(--radius-md);
    padding:22px 24px; font-size:15px; color:var(--text-cream);
  }
  .problem-row .q{ font-family:var(--font-display); font-size:22px; color:var(--accent-mango-soft); flex-shrink:0; line-height:1; }

  /* SOLUCION */
  .solution-block{
    margin-top:44px; background:var(--bg-panel); border:1px solid var(--border-soft);
    border-radius:var(--radius-lg); padding:44px; text-align:center;
  }
  .solution-block .line1{ font-size:17px; color:var(--text-muted); max-width:600px; margin:0 auto; }
  .solution-arrow{ margin:20px auto; width:26px; height:26px; color:var(--accent-lime); }
  .solution-block .line2{ font-family:var(--font-display); font-size:clamp(22px,2.8vw,30px); color:var(--text-cream); max-width:680px; margin:0 auto; line-height:1.3; }
  .solution-block .line2 em{ font-style:normal; color:var(--accent-lime); }

  /* CONTENIDO */
  .contents-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin-top:48px; }
  .content-card{
    background:linear-gradient(160deg, var(--bg-card) 0%, var(--bg-panel) 100%);
    border:1px solid var(--border-soft); border-radius:var(--radius-md);
    padding:30px 26px; transition:transform .3s ease, border-color .3s ease;
  }
  .content-card:hover{ transform:translateY(-6px); border-color:var(--accent-lime); }
  .content-card .num-badge{
    width:44px; height:44px; border-radius:50%; background:rgba(198,255,61,0.12); color:var(--accent-lime);
    display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-weight:700; font-size:15px;
    margin-bottom:18px;
  }
  .content-card h3{ font-family:var(--font-body); font-size:17px; font-weight:700; margin-bottom:8px; }
  .content-card p{ font-size:14px; color:var(--text-muted); }

  /* GALERIA — carrusel */
  .gallery-carousel{
    margin-top:44px; display:flex; align-items:center; gap:20px; justify-content:center;
  }
  .gallery-slide{
    position:relative; width:100%; max-width:460px; aspect-ratio:1/1;
    border-radius:var(--radius-lg); overflow:hidden; border:1px solid var(--border-soft);
    background:var(--bg-card); box-shadow:0 24px 50px -18px var(--shadow-color);
  }
  .gallery-slide img{ width:100%; height:100%; object-fit:cover; display:block; }
  .gallery-slide-caption{
    position:absolute; left:0; right:0; bottom:0; padding:22px 24px;
    background:linear-gradient(180deg, transparent 0%, rgba(11,20,15,0.94) 85%);
  }
  .gallery-slide-caption h4{ font-family:var(--font-display); font-size:20px; font-weight:600; color:var(--text-cream); }
  .gallery-slide-caption p{ font-size:13.5px; color:var(--text-muted); margin-top:6px; line-height:1.5; }
  .gallery-counter{
    position:absolute; top:16px; right:16px; background:rgba(11,20,15,0.55);
    color:var(--text-cream); font-size:12px; font-weight:700; padding:5px 12px; border-radius:100px;
    backdrop-filter:blur(6px);
  }
  .gallery-arrow{
    flex-shrink:0; width:52px; height:52px; border-radius:50%;
    background:var(--bg-card); border:1px solid var(--border-soft); color:var(--text-cream);
    display:flex; align-items:center; justify-content:center;
    transition:background .25s ease, color .25s ease, transform .2s ease;
  }
  .gallery-arrow:hover{ background:var(--accent-lime); color:#12200f; transform:scale(1.06); }
  .gallery-dots{ display:flex; justify-content:center; gap:8px; margin-top:22px; }
  .gallery-dot{ width:8px; height:8px; border-radius:50%; background:rgba(246,243,231,0.22); transition:background .25s ease, width .25s ease; cursor:pointer; }
  .gallery-dot.active{ background:var(--accent-lime); width:22px; border-radius:5px; }

  /* COMO AYUDA / RESULTADO */
  .transform-grid{ display:grid; grid-template-columns:1fr 1fr; gap:24px; margin-top:44px; }
  .transform-col{ border-radius:var(--radius-lg); padding:34px 30px; }
  .transform-col.before{ background:rgba(255,145,66,0.06); border:1px solid rgba(255,145,66,0.22); }
  .transform-col.after{ background:rgba(198,255,61,0.06); border:1px solid rgba(198,255,61,0.28); }
  .transform-col h3{ font-family:var(--font-body); font-size:13px; font-weight:800; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:20px; }
  .transform-col.before h3{ color:var(--accent-mango-soft); }
  .transform-col.after h3{ color:var(--accent-lime); }
  .transform-item{ display:flex; align-items:flex-start; gap:12px; padding:11px 0; border-bottom:1px solid rgba(246,243,231,0.07); font-size:14.5px; color:var(--text-cream); }
  .transform-item:last-child{ border-bottom:none; }
  .transform-item svg{ flex-shrink:0; margin-top:2px; }

  .quote-callout{
    margin-top:40px; text-align:center; padding:36px 20px;
    border-top:1px solid var(--border-soft); border-bottom:1px solid var(--border-soft);
  }
  .quote-callout .qmark{ font-family:var(--font-display); font-size:52px; color:var(--accent-lime); line-height:0.5; display:block; margin-bottom:6px; }
  .quote-callout p{ font-family:var(--font-display); font-size:clamp(20px,2.6vw,27px); max-width:640px; margin:0 auto; color:var(--text-cream); line-height:1.4; }

  /* BENEFICIOS */
  .benefits-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:18px; margin-top:44px; }
  .benefit-card{ background:var(--bg-card); border:1px solid var(--border-soft); border-radius:var(--radius-md); padding:26px 22px; }
  .benefit-card .ic{ width:30px; height:30px; color:var(--accent-lime); margin-bottom:14px; }
  .benefit-card p{ font-size:14px; font-weight:600; color:var(--text-cream); line-height:1.45; }

  /* OFERTA */
  .offer-box{
    margin-top:44px; background:linear-gradient(150deg, var(--bg-card) 0%, var(--bg-panel) 100%);
    border:1px solid var(--accent-lime); border-radius:var(--radius-lg); padding:48px; position:relative; overflow:hidden;
    display:grid; grid-template-columns:1.1fr 0.9fr; gap:40px; align-items:center; text-align:left;
  }
  .offer-box::before{ content:''; position:absolute; inset:0; background:radial-gradient(circle at 15% 0%, rgba(198,255,61,0.12), transparent 55%); }
  .offer-box > *{ position:relative; z-index:2; }
  .offer-value-list{ display:flex; flex-direction:column; gap:12px; }
  .offer-value-row{ display:flex; justify-content:space-between; align-items:center; font-size:14.5px; padding-bottom:12px; border-bottom:1px dashed rgba(246,243,231,0.12); }
  .offer-value-row span:first-child{ color:var(--text-muted); }
  .offer-value-row span:last-child{ font-weight:700; }
  .offer-value-total{ display:flex; justify-content:space-between; font-size:17px; font-weight:800; padding-top:4px; }
  .offer-side{ text-align:center; background:var(--bg-card); border-radius:var(--radius-md); padding:34px 24px; border:1px solid var(--border-soft); }
  .offer-side .small{ font-size:12.5px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.06em; font-weight:700; }
  .offer-side .old{ font-size:19px; color:var(--text-dim); text-decoration:line-through; margin-top:12px; }
  .offer-side .big{ font-family:var(--font-display); font-size:50px; font-weight:700; color:var(--accent-lime); margin-top:2px; }
  .offer-side .save{ display:inline-block; margin-top:10px; background:rgba(255,145,66,0.15); color:var(--accent-mango-soft); font-size:12px; font-weight:800; padding:6px 14px; border-radius:100px; }
  .offer-side .btn{ margin-top:20px; }
  .offer-side .note{ margin-top:12px; font-size:12px; color:var(--text-dim); }

  /* BONOS */
  .bonus-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:22px; margin-top:44px; }
  .bonus-card{ position:relative; background:var(--bg-panel); border:1px solid var(--border-soft); border-radius:var(--radius-md); padding:30px 26px 26px; }
  .bonus-tag{ position:absolute; top:-12px; left:24px; background:var(--accent-mango); color:#241207; font-size:11px; font-weight:800; letter-spacing:0.06em; text-transform:uppercase; padding:6px 14px; border-radius:100px; }
  .bonus-card h3{ font-family:var(--font-body); font-size:16.5px; font-weight:700; margin:10px 0 8px; }
  .bonus-card p{ font-size:14px; color:var(--text-muted); }
  .bonus-card .bv{ margin-top:14px; font-size:13px; color:var(--accent-lime); font-weight:700; }

  /* PLANES */
  .plans-grid{ display:grid; grid-template-columns:1fr 1fr; gap:26px; margin-top:44px; align-items:stretch; }
  .plan-card{ background:var(--bg-card); border:1px solid var(--border-soft); border-radius:var(--radius-lg); padding:38px 32px; display:flex; flex-direction:column; }
  .plan-card.featured{
    background:linear-gradient(160deg, rgba(198,255,61,0.1), var(--bg-card) 60%);
    border:1.5px solid var(--accent-lime); box-shadow:0 30px 60px -20px rgba(0,0,0,0.6);
  }
  .plan-tag{ align-self:flex-start; background:var(--accent-lime); color:#12200f; font-size:11px; font-weight:800; letter-spacing:0.05em; text-transform:uppercase; padding:6px 14px; border-radius:100px; margin-bottom:18px; }
  .plan-card h3{ font-family:var(--font-body); font-size:22px; font-weight:800; }
  .plan-card .plan-desc{ font-size:14px; color:var(--text-muted); margin-top:8px; }
  .plan-price{ margin:24px 0; }
  .plan-price .amt{ font-family:var(--font-display); font-size:42px; font-weight:700; }
  .plan-price .per{ font-size:13px; color:var(--text-muted); }
  .plan-features{ display:flex; flex-direction:column; gap:12px; margin-bottom:26px; flex-grow:1; }
  .plan-features .f{ display:flex; align-items:flex-start; gap:10px; font-size:14.5px; }
  .plan-features svg{ flex-shrink:0; margin-top:2px; color:var(--accent-lime); }

  /* GARANTIA */
  .guarantee-box{ margin-top:44px; display:flex; align-items:center; gap:40px; background:var(--bg-panel); border:1px solid var(--border-soft); border-radius:var(--radius-lg); padding:44px; }
  .guarantee-icon{ width:104px; height:104px; flex-shrink:0; color:var(--accent-lime); }
  .guarantee-box h3{ font-size:22px; margin-bottom:10px; }
  .guarantee-box p{ color:var(--text-muted); font-size:15px; max-width:560px; }

  /* FAQ */
  .faq-list{ margin-top:40px; display:flex; flex-direction:column; gap:14px; }
  .faq-item{ background:var(--bg-card); border:1px solid var(--border-soft); border-radius:var(--radius-md); overflow:hidden; }
  .faq-q{ display:flex; align-items:center; justify-content:space-between; padding:22px 26px; cursor:pointer; font-weight:700; font-size:15px; }
  .faq-q .plus{ font-size:22px; color:var(--accent-lime); transition:transform .3s ease; flex-shrink:0; margin-left:16px; }
  .faq-item.open .plus{ transform:rotate(45deg); }
  .faq-a{ max-height:0; overflow:hidden; transition:max-height .35s ease, padding .35s ease; padding:0 26px; font-size:14.5px; color:var(--text-muted); }
  .faq-item.open .faq-a{ max-height:220px; padding:0 26px 22px; }

  /* CTA FINAL */
  .final-cta{ text-align:center; }
  .final-cta h2{ font-size:clamp(28px,4vw,44px); max-width:760px; margin:0 auto; line-height:1.18; }
  .final-cta p.lead{ max-width:560px; margin:20px auto 0; color:var(--text-muted); font-size:16.5px; }
  .final-cta .btn{ margin-top:32px; }

  footer{ background:#0B140F; padding:56px 0 28px; border-top:1px solid rgba(246,243,231,0.06); }
  .footer-top{ display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:30px; }
  .footer-links{ display:flex; gap:28px; flex-wrap:wrap; }
  .footer-links a{ font-size:13.5px; color:var(--text-muted); }
  .footer-links a:hover{ color:var(--accent-lime); }
  .footer-disclaimer{ margin-top:34px; padding-top:26px; border-top:1px solid rgba(246,243,231,0.06); font-size:12px; color:var(--text-dim); line-height:1.7; max-width:820px; }

  .sticky-bar{
    position:fixed; bottom:0; left:0; right:0; z-index:70;
    background:var(--bg-panel); border-top:1px solid var(--border-soft);
    padding:12px 18px; display:none; align-items:center; justify-content:space-between; gap:14px;
    box-shadow:0 -10px 30px rgba(0,0,0,0.4);
  }
  .sticky-bar .price{ font-family:var(--font-display); font-weight:700; font-size:19px; color:var(--accent-lime); }
  .sticky-bar .old{ font-size:12px; color:var(--text-dim); text-decoration:line-through; }

  .float-btn{
    position:fixed; right:22px; bottom:90px; z-index:65; width:56px; height:56px; border-radius:50%;
    background:var(--accent-lime); display:flex; align-items:center; justify-content:center;
    box-shadow:0 12px 26px -6px rgba(198,255,61,0.6); animation:pulse 2.6s ease-in-out infinite;
  }
  @keyframes pulse{ 0%,100%{ box-shadow:0 12px 26px -6px rgba(198,255,61,0.6);} 50%{ box-shadow:0 12px 34px -4px rgba(198,255,61,0.85);} }

  @media (max-width: 900px){
    .hero-grid{ grid-template-columns:1fr; }
    .hero-visual{ height:380px; max-width:420px; margin:0 auto; }
    .problem-list, .contents-grid, .benefits-grid, .bonus-grid{ grid-template-columns:repeat(2,1fr); }
    .transform-grid, .plans-grid, .offer-box{ grid-template-columns:1fr; }
    .guarantee-box{ flex-direction:column; text-align:center; }
    .plan-card.featured{ transform:none; }
    .sticky-bar{ display:flex; }
    body{ padding-bottom:78px; }
    .gallery-slide{ max-width:340px; }
    .gallery-arrow{ width:44px; height:44px; }
  }
  @media (max-width: 560px){
    .problem-list, .contents-grid, .benefits-grid, .bonus-grid{ grid-template-columns:1fr; }
    section{ padding:60px 0; }
    .offer-box, .solution-block, .guarantee-box{ padding:26px; }
    .nav-cta{ display:none; }
    .gallery-carousel{ gap:10px; }
    .gallery-slide{ max-width:240px; }
    .gallery-arrow{ width:38px; height:38px; }
    .gallery-slide-caption h4{ font-size:16px; }
  }
  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
  }
</style>
</head>
<body>

<header class="nav">
  <div class="nav-inner">
    <div class="brand-mark" id="navBrand"></div>
    <a href="#oferta" class="btn btn-primary nav-cta" id="navCta"></a>
  </div>
</header>

<main>
  <!-- 1. HERO -->
  <section class="hero" id="hero"><div class="wrap hero-grid">
    <div>
      <span class="hero-kicker" id="heroKicker"></span>
      <h1 id="heroHeadline"></h1>
      <p class="sub" id="heroSub"></p>
      <div class="hero-cta-row">
        <a href="#oferta" class="btn btn-primary" id="heroCta"></a>
      </div>
      <div class="hero-checklist" id="heroChecklist"></div>
    </div>
    <div class="hero-visual" id="heroVisual"></div>
  </div></section>

  <!-- 2. PROBLEMA -->
  <section id="problema"><div class="wrap">
    <div class="section-head reveal">
      <span class="eyebrow" id="problemEyebrow"></span>
      <h2 id="problemTitle"></h2>
    </div>
    <div class="problem-list" id="problemList"></div>
  </div></section>

  <!-- 3. SOLUCION -->
  <section class="panel-bg" id="solucion"><div class="wrap">
    <div class="section-head center reveal">
      <span class="eyebrow" id="solutionEyebrow"></span>
    </div>
    <div class="solution-block reveal" id="solutionBlock"></div>
  </div></section>




  <!-- 4. QUE ESTA INCLUIDO -->
  <section id="contenido"><div class="wrap">
    <div class="section-head reveal">
      <span class="eyebrow" id="contentsEyebrow"></span>
      <h2 id="contentsTitle"></h2>
      <p class="lead" id="contentsLead"></p>
    </div>
    <div class="contents-grid" id="contentsGrid"></div>
  </div></section>

      <!-- 7. OFERTA -->
  <section id="oferta"><div class="wrap">
    <div class="section-head center reveal">
      <span class="eyebrow" id="offerEyebrow" style="justify-content:center;"></span>
      <h2 id="offerTitle" style="margin:14px auto 0;"></h2>
    </div>
    <div class="offer-box" id="offerBox"></div>
  </div></section>

  <!-- GALERIA -->
  <section class="panel-bg" id="galeria"><div class="wrap">
    <div class="section-head reveal">
      <span class="eyebrow" id="galleryEyebrow"></span>
      <h2 id="galleryTitle"></h2>
      <p class="lead" id="galleryLead"></p>
    </div>
    <div class="gallery-carousel reveal">
      <button class="gallery-arrow left" id="galleryPrev" aria-label="Receta anterior">
        <svg viewBox="0 0 24 24" fill="none" width="22" height="22"><path d="M15 5 8 12l7 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="gallery-slide">
        <img id="gallerySlideImg" src="" alt="">
        <div class="gallery-slide-caption">
          <h4 id="gallerySlideTitle"></h4>
          <p id="gallerySlideDesc"></p>
        </div>
        <div class="gallery-counter" id="galleryCounter"></div>
      </div>
      <button class="gallery-arrow right" id="galleryNext" aria-label="Siguiente receta">
        <svg viewBox="0 0 24 24" fill="none" width="22" height="22"><path d="m9 5 7 7-7 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
    <div class="gallery-dots" id="galleryDots"></div>
  </div></section>



  <!-- 5. COMO AYUDA EN LA RUTINA -->
  <section id="resultado"><div class="wrap">
    <div class="section-head reveal">
      <span class="eyebrow" id="resultEyebrow"></span>
      <h2 id="resultTitle"></h2>
    </div>
    <div class="transform-grid" id="transformGrid"></div>
    <div class="quote-callout reveal" id="quoteCallout"></div>
  </div></section>

  <!-- 6. BENEFICIOS -->
  <section class="panel-bg" id="beneficios"><div class="wrap">
    <div class="section-head reveal">
      <span class="eyebrow" id="benefitsEyebrow"></span>
      <h2 id="benefitsTitle"></h2>
    </div>
    <div class="benefits-grid" id="benefitsGrid"></div>
  </div></section>

  <!-- 7. OFERTA 
  <section id="oferta"><div class="wrap">
    <div class="section-head center reveal">
      <span class="eyebrow" id="offerEyebrow" style="justify-content:center;"></span>
      <h2 id="offerTitle" style="margin:14px auto 0;"></h2>
    </div>
    <div class="offer-box" id="offerBox"></div>
  </div></section> -->

  <!-- 8. BONOS -->
  <section class="panel-bg" id="bonos"><div class="wrap">
    <div class="section-head reveal">
      <span class="eyebrow" id="bonusEyebrow"></span>
      <h2 id="bonusTitle"></h2>
    </div>
    <div class="bonus-grid" id="bonusGrid"></div>
  </div></section>

  <!-- 9. PLANES 
  <section id="planes"><div class="wrap">
    <div class="section-head reveal">
      <span class="eyebrow" id="plansEyebrow"></span>
      <h2 id="plansTitle"></h2>
    </div>
    <div class="plans-grid" id="plansGrid"></div>
  </div></section> -->

  <!-- 10. GARANTIA -->
  <section class="panel-bg" id="garantia"><div class="wrap">
    <div class="guarantee-box reveal" id="guaranteeBox"></div>
  </div></section>

  <!-- 11. FAQ -->
  <section id="faq"><div class="wrap" style="max-width:820px;">
    <div class="section-head reveal">
      <span class="eyebrow" id="faqEyebrow"></span>
      <h2 id="faqTitle"></h2>
    </div>
    <div class="faq-list" id="faqList"></div>
  </div></section>

  <!-- 12. CTA FINAL -->
  <section class="final-cta" id="cta-final"><div class="wrap">
    <h2 id="finalCtaTitle" class="reveal"></h2>
    <p class="lead reveal" id="finalCtaLead"></p>
    <a href="#oferta" class="btn btn-primary reveal" id="finalCtaBtn"></a>
  </div></section>
</main>

<footer>
  <div class="wrap">
    <div class="footer-top">
      <div class="brand-mark" id="footerBrand"></div>
      <div class="footer-links" id="footerLinks"></div>
    </div>
    <p class="footer-disclaimer" id="footerDisclaimer"></p>
  </div>
</footer>

/* =========================================================
   GALERIA — carrusel
   ========================================================= */
let galleryIndex = 0;

function renderGallery(){
  document.getElementById("galleryEyebrow").textContent = "Galería";
  document.getElementById("galleryTitle").textContent = "Algunas de las recetas que vas a aprender a preparar";
  document.getElementById("galleryLead").textContent =
    "Un adelanto de la variedad que encontrarás dentro de la colección: opciones dulces y saludables para disfrutar sin culpa.";

  document.getElementById("galleryDots").innerHTML = CONFIG.gallery.map((g, i) =>
    `<span class="gallery-dot${i === 0 ? ' active' : ''}" data-i="${i}"></span>`
  ).join("");

  function showSlide(i){
    const total = CONFIG.gallery.length;
    galleryIndex = (i + total) % total;
    const item = CONFIG.gallery[galleryIndex];
    document.getElementById("gallerySlideImg").src = GALLERY_IMAGES[item.key];
    document.getElementById("gallerySlideImg").alt = item.title;
    document.getElementById("gallerySlideTitle").textContent = item.title;
    document.getElementById("gallerySlideDesc").textContent = item.desc;
    document.getElementById("galleryCounter").textContent = `${galleryIndex + 1} / ${total}`;
    document.querySelectorAll(".gallery-dot").forEach((d, di) => d.classList.toggle("active", di === galleryIndex));
  }

  document.getElementById("galleryPrev").addEventListener("click", () => showSlide(galleryIndex - 1));
  document.getElementById("galleryNext").addEventListener("click", () => showSlide(galleryIndex + 1));
  document.querySelectorAll(".gallery-dot").forEach(dot => {
    dot.addEventListener("click", () => showSlide(parseInt(dot.dataset.i, 10)));
  });

  showSlide(0);
}

/* =========================================================
   Scroll reveal + init
   ========================================================= */
function initReveal(){
  const els = document.querySelectorAll(".reveal");
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if(e.isIntersecting){ e.target.classList.add("in"); obs.unobserve(e.target); }
    });
  }, { threshold: 0.12 });
  els.forEach(el => obs.observe(el));
}
